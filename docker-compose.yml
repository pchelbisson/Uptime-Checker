services:
  app:
    build: .
    container_name: uptime-app
    env_file:
      - .env
    networks:
      - uptime-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: uptime-proxy
    ports:
      - "${NGINX_PORT}:80"
    env_file:
      - .env
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    command: >
      sh -c "envsubst '\$$RATE_LIMIT_RPS \$$RATE_LIMIT_BURST \$$APP_PORT' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    depends_on:
      - app
    networks:
      - uptime-network

  db:
    image: postgres:16-alpine
    container_name: uptime-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uptime-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:

networks:
  uptime-network:
    driver: bridge